<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    .bg { fill: #0f172a; }
    .circle-glow { fill: url(#greenGlow); opacity: 0.15; }
    .circle-base { fill: #1e293b; stroke: url(#gradGreen); stroke-width: 4; }
    .currency-symbol { font-family: 'Montserrat', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 900; fill: url(#gradGreen); filter: drop-shadow(0px 4px 8px rgba(34, 197, 94, 0.3)); }
  </style>

  <defs>
    <!-- Gradient for the Dollar Sign and Border -->
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>

    <!-- Outer Glow Filter effect -->
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background Background -->
  <rect width="100" height="100" rx="16" class="bg" />

  <!-- Ambient Glow -->
  <circle cx="50" cy="50" r="45" class="circle-glow" />

  <!-- Main Emblem Circle -->
  <circle cx="50" cy="50" r="36" class="circle-base" />

  <!-- Stylized Dollar Sign Symbol -->
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-size="46" class="currency-symbol">$</text>
</svg>