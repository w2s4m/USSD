<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1">

<meta
name="theme-color"
content="#020617">

<meta
name="mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<title>
USSD Pay v2.7
</title>

<link
rel="manifest"
href="manifest.json">

<link
rel="stylesheet"
href="style.css">

<link rel="stylesheet" href="css/all.min.css">

<meta name="mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="icons/icon-192.png">

<meta name="apple-mobile-web-app-title" content="USSD Pay">

</head>

<body>

<!-- Splash -->

<div id="splash">

    <img
    src="icons/logo.png"
    alt="Logo"
    class="splash-logo">

    <h1>
    USSD Pay
    </h1>

    <p>
    Ver:2.7
    </p>

</div>

<!-- Toast -->

<div id="toast"></div>

<!-- Loader -->

<div id="loader">

    <div class="spinner"></div>

</div>

<!-- App -->

<div id="app">

<header>

    <div class="header-left">

        <img
        src="icons/logo.png"
        class="logo-small"
        alt="Logo">

    </div>

    <div class="header-center">

        <h2>
        USSD Pay
        </h2>

    </div>

    <div class="header-right">

        <a
        href="settings.html"
        class="settings-btn">

        <i class="fa-solid fa-gear"></i>

        </a>

    </div>

</header>

<!-- Device Info -->

<div class="device-card">

    <div class="device-bar">

        <span id="deviceName"></span>

        <span id="currentDate"></span>

        <span id="currentTime"></span>

    </div>

</div>

<div class="device-card">

    <div id="networkStatus">
        🟢 متصل
    </div>

</div>


<!-- Main Card -->

<div class="card">

    <div class="services">

        <button
        class="service active"
        data-service="jawwal">

        جوال باي - JAWWALPAY

        </button>

        <button
        class="service"
        data-service="palpay">

        بال باي - PALPAY

        </button>

    </div>

    <select id="savedUsers">

        <option value="">

        اختر مستلم

        </option>

    </select>

    <input
    type="text"
    id="receiverName"
    placeholder="اسم المستلم">

    <input
    type="tel"
    id="phone"
    placeholder="رقم الهاتف">

    <input
    type="number"
    id="amount"
    placeholder="المبلغ">

    <button
    class="secondary-btn"
    onclick="saveReceiver()">

    <i class="fa-solid fa-bookmark"></i>

    حفظ المستلم

    </button>

    <button
    class="main-btn"
    onclick="generateUSSD()">

    <i class="fa-solid fa-paper-plane"></i>

    تحويل الآن

    </button>

</div>

<!-- History -->

<div class="card">

    <h3>

        <i class="fa-solid fa-clock-rotate-left"></i>

        آخر التحويلات

    </h3>

    <div
    id="historyList">
    </div>

</div>

<footer>

    USSD Pay v2.7

    <br>

    تصميم وتطوير

    <strong>

    وسام فحجان

    </strong>

</footer>

</div>

<!-- USSD Modal -->

<div
id="ussdModal"
class="modal">

    <div
    class="modal-content">

        <h3>

        <i class="fa-solid fa-code"></i>

        مراجعة الكود

        </h3>

        <textarea
        id="ussdPreview"
        readonly>
        </textarea>

        <div class="modal-actions">

        <button onclick="copyUSSD()">
            <i class="fa-solid fa-copy"></i>
        نسخ    
        </button>

        <button onclick="callUSSD()">
            <i class="fa-solid fa-phone"></i>
        اتصال    
        </button>

        <button onclick="closeUSSDModal()">
            <i class="fa-solid fa-check"></i>
         فهمت    
        </button>

        </div>

    </div>

</div>

<!-- Install App -->

<div
id="installBanner"
class="install-banner">

    <div>

        <strong>
        📱 تثبيت USSD Pay
        </strong>

        <br>

        <small>
        تثبيت التطبيق للوصول السريع
        </small>

    </div>

    <button
    id="installBtn">

    تثبيت

    </button>

</div>

<!-- iPhone Install -->

<div
id="iosInstallModal"
class="modal">

    <div
    class="modal-content">

        <h3>
        📱 تثبيت USSD Pay
        </h3>

        <br>

        <p>
        لتثبيت التطبيق على iPhone:
        </p>

        <br>

        <p>
        1️⃣ اضغط زر المشاركة
        </p>

        <p>
        2️⃣ اختر
        "إضافة إلى الشاشة الرئيسية"
        </p>

        <br>

        <button
        class="main-btn"
        onclick="closeIOSInstall()">

        فهمت

        </button>

    </div>

</div>

<script src="script.js"></script>

<script>

if(
'serviceWorker'
in navigator
){

    window.addEventListener(
    'load',

    ()=>{

        navigator
        .serviceWorker
        .register(
            './sw.js'
        );

    });

}

</script>

</body>

</html>
