<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1">

<meta
name="theme-color"
content="#020617">

<meta
name="mobile-web-app-capable"
content="yes">

<title>
الإعدادات - USSD Pay v2.8
</title>

<link
rel="manifest"
href="manifest.json">

<link
rel="stylesheet"
href="style.css">

<link rel="stylesheet" href="css/all.min.css">

</head>

<body>

<div id="app">

<header>

    <div class="header-left">

        <img
        src="icons/logo.png"
        class="logo-small"
        alt="Logo">

    </div>

    <div class="header-center">

        <h2>
        الإعدادات
        </h2>

    </div>

    <div class="header-right">

        <a href="./index.html" class="settings-btn">

        <i class="fa-solid fa-house"></i>

        </a>

    </div>

</header>

<!-- المظهر -->

<div class="card">

    <h3>
    <i class="fa-solid fa-palette"></i>
    المظهر
    </h3>

    <br>

    <button
    class="main-btn"
    onclick="toggleTheme()">

    <i class="fa-solid fa-moon"></i>
    تبديل الوضع

    </button>

</div>

<!-- كلمة السر -->

<div class="card">

    <h3>
    <i class="fa-solid fa-lock"></i>
    كلمة سر جوال باي
    </h3>

    <br>

    <button
    class="secondary-btn"
    onclick="changePassword()">

    <i class="fa-solid fa-key"></i>
    تغيير كلمة السر

    </button>

    <button
    class="secondary-btn"
    onclick="clearPassword()">

    <i class="fa-solid fa-trash"></i>
    حذف كلمة السر

    </button>

</div>

<!-- النسخة الاحتياطية -->

<div class="card">

    <h3>
    <i class="fa-solid fa-database"></i>
    النسخة الاحتياطية
    </h3>

    <br>

    <button
    class="main-btn"
    onclick="exportBackup()">

    <i class="fa-solid fa-file-export"></i>
    تصدير نسخة

    </button>

    <br><br>

    <input
    type="file"
    id="backupFile"
    accept=".json">

    <button
    class="secondary-btn"
    onclick="restoreBackup()">

    <i class="fa-solid fa-file-import"></i>
    استيراد نسخة

    </button>

</div>

<!-- إدارة التطبيق -->

<div class="card">

    <h3>
    <i class="fa-solid fa-gear"></i>
    إدارة التطبيق
    </h3>

    <br>

    <button
    class="secondary-btn"
    onclick="resetApp()">

    <i class="fa-solid fa-power-off"></i>
    إعادة ضبط

    </button>

</div>

<!-- دعم صاحب المشروع -->

<div class="card">

    <h3>
    <i class="fa-solid fa-heart"></i>
    ادعم صاحب المشروع
    </h3>

    <br>

    <p>
    وسام فحجان جوال باي و بال باي
    </p>

    <p>
    0599747574
    </p>

    <br>

    <button
    class="main-btn"
    onclick="copySupportNumber()">

    <i class="fa-solid fa-copy"></i>
    نسخ الرقم

    </button>

</div>

<!-- معلومات -->

<div class="card">

    <h3>
    <i class="fa-solid fa-circle-info"></i>
    معلومات التطبيق
    </h3>

    <br>

    <p>
    USSD Pay v2.8
    </p>

    <p>
    يدعم جوال باي وبال باي
    </p>

</div>

<footer>

USSD Pay v2.8

<br>

تصميم وتطوير

<strong>
وسام فحجان
</strong>

</footer>

</div>

<script src="script.js"></script>

<script>

function changePassword(){

    const password =
    prompt("أدخل كلمة السر الجديدة");

    if(!password) return;

    localStorage.setItem(
        "ussd_password",
        password
    );

    showToast("تم حفظ كلمة السر");
}

function restoreBackup(){

    const file =
    document.getElementById("backupFile").files[0];

    if(!file){
        showToast("اختر ملف");
        return;
    }

    importBackup(file);
}

function copySupportNumber(){

    navigator.clipboard.writeText("0599747574");

    showToast("تم نسخ الرقم");

}

</script>

</body>

</html>
