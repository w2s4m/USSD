<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>الإعدادات - USSD Pay</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230f172a' width='180' height='180'/><text x='90' y='110' font-size='80' font-weight='bold' text-anchor='middle' fill='%232563eb' font-family='Arial'>₪</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <a href="index.html" class="btn-icon">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                </div>
                <div class="header-center">
                    <h1 class="app-title">الإعدادات</h1>
                </div>
                <div class="header-right"></div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Receivers Management -->
            <div class="card">
                <h2 class="card-title">
                    <i class="fas fa-users"></i>
                    المستقبلون المحفوظون
                </h2>
                <div id="receiversList" class="receivers-list"></div>
                <button class="btn btn-secondary" onclick="deleteAllReceivers()" style="margin-top: 12px;">
                    <i class="fas fa-trash"></i>
                    حذف الكل
                </button>
            </div>

            <!-- Password Management -->
            <div class="card">
                <h2 class="card-title">
                    <i class="fas fa-lock"></i>
                    الأمان
                </h2>
                <p style="color: var(--text-secondary); font-size: 13px; margin-bottom: 12px;">
                    كلمة السر تُحفظ محلياً في جهازك فقط
                </p>
                <button class="btn btn-secondary" onclick="APP.clearPassword()">
                    <i class="fas fa-key"></i>
                    حذف كلمة السر
                </button>
            </div>

            <!-- Backup & Restore -->
            <div class="card">
                <h2 class="card-title">
                    <i class="fas fa-download"></i>
                    النسخة الاحتياطية
                </h2>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button class="btn btn-secondary" onclick="APP.exportBackup()">
                        <i class="fas fa-download"></i>
                        تصدير النسخة
                    </button>
                    <button class="btn btn-secondary" onclick="importBackupFile()">
                        <i class="fas fa-upload"></i>
                        استيراد النسخة
                    </button>
                    <input type="file" id="backupFile" accept=".json" style="display: none;" onchange="handleBackupImport(this)">
                </div>
            </div>

            <!-- App Information -->
            <div class="card">
                <h2 class="card-title">
                    <i class="fas fa-info-circle"></i>
                    عن التطبيق
                </h2>
                <div style="font-size: 13px; color: var(--text-secondary);">
                    <p><strong>التطبيق:</strong> USSD Pay</p>
                    <p><strong>الإصدار:</strong> 3.0</p>
                    <p><strong>النوع:</strong> تطبيق ويب (PWA)</p>
                    <p><strong>اللغة:</strong> العربية</p>
                    <p style="margin-top: 12px;">
                        تطبيق آمن وسريع لتحويل الأموال عبر جوال باي وبال باي
                    </p>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="card danger-zone">
                <h2 class="card-title" style="color: var(--error);">
                    <i class="fas fa-exclamation-triangle"></i>
                    منطقة الخطر
                </h2>
                <p style="color: var(--text-secondary); font-size: 13px; margin-bottom: 12px;">
                    هذه الإجراءات غير قابلة للتراجع
                </p>
                <button class="btn btn-secondary" onclick="APP.resetApp()" style="background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error);">
                    <i class="fas fa-redo"></i>
                    إعادة تعيين التطبيق
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>USSD Pay v3.0</p>
        </footer>
    </div>

    <script>
        // Load receivers list
        function loadReceiversList() {
            const receivers = APP.getReceivers();
            const list = document.getElementById('receiversList');
            
            if (receivers.length === 0) {
                list.innerHTML = '<div class="history-empty">لا توجد مستقبلون محفوظون</div>';
                return;
            }
            
            list.innerHTML = receivers.map((r, i) => `
                <div class="receiver-item">
                    <div>
                        <strong>${r.name}</strong>
                        <br>
                        <small>${r.phone}</small>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-icon" onclick="toggleFavorite(${i})" title="المفضلة">
                            <i class="fas ${r.favorite ? 'fa-star' : 'fa-star-empty'}"></i>
                        </button>
                        <button class="btn-icon" onclick="deleteReceiver(${i})" title="حذف">
                            <i class="fas fa-trash" style="color: var(--error);"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function toggleFavorite(index) {
            const receivers = APP.getReceivers();
            receivers[index].favorite = !receivers[index].favorite;
            APP.saveReceivers(receivers);
            loadReceiversList();
            APP.showToast(receivers[index].favorite ? '⭐ أضيف للمفضلات' : '✓ أزيل من المفضلات');
        }

        function deleteReceiver(index) {
            if (confirm('حذف هذا المستقبل؟')) {
                const receivers = APP.getReceivers();
                const name = receivers[index].name;
                receivers.splice(index, 1);
                APP.saveReceivers(receivers);
                loadReceiversList();
                APP.showToast(`✓ تم حذف ${name}`);
            }
        }

        function deleteAllReceivers() {
            if (confirm('هل أنت متأكد؟ سيتم حذف جميع المستقبلين')) {
                APP.saveReceivers([]);
                loadReceiversList();
                APP.showToast('✓ تم حذف جميع المستقبلين');
            }
        }

        function importBackupFile() {
            document.getElementById('backupFile').click();
        }

        function handleBackupImport(input) {
            if (input.files && input.files[0]) {
                APP.importBackup(input.files[0]);
                loadReceiversList();
            }
        }

        // Initialize
        loadReceiversList();
    </script>
</body>
</html>
